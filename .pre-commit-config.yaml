default_install_hook_types: [pre-commit, pre-push, commit-msg]
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
      - id: check-json
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: check-added-large-files
        args: ['--maxkb=1000']
        stages: [pre-commit]
      - id: check-docstring-first
        stages: [pre-commit]
      - id: debug-statements
        stages: [pre-commit]
      - id: name-tests-test
        args: ['--pytest-test-first']
        stages: [pre-commit]

  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3
        args: ['--line-length=100']
        stages: [pre-commit]

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile=black', '--line-length=100']
        stages: [pre-commit]

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.1.13
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: commit-msg-validator
        name: commit-msg-validator
        entry: python scripts/validate_commit_msg.py
        language: system
        pass_filenames: true
        always_run: true
        stages: [commit-msg]

      - id: pytest-smoke-pre-push
        name: pytest-smoke-pre-push
        entry: pytest tests/test_commit_message_validator.py tests/test_models_cache.py -q --maxfail=1
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: flake8-advisory
        name: flake8-advisory
        entry: python3 -m flake8 src/ tests/ --max-line-length=100 --extend-ignore=E203,W503
        language: system
        pass_filenames: false
        stages: [manual]

      - id: mypy-advisory
        name: mypy-advisory
        entry: python3 -m mypy src/openrouter_mcp
        language: system
        pass_filenames: false
        stages: [manual]

      - id: bandit-advisory
        name: bandit-advisory
        entry: python3 -m bandit -r src/ --ini .bandit
        language: system
        pass_filenames: false
        stages: [manual]

      - id: pylint-advisory
        name: pylint-advisory
        entry: python3 -m pylint src/ --rcfile=.pylintrc
        language: system
        pass_filenames: false
        stages: [manual]

ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
