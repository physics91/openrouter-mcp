[pytest]
# Pytest configuration for OpenRouter MCP Server
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio configuration
asyncio_mode = auto

# Console output
console_output_style = progress
addopts =
    --verbose
    --tb=short
    --strict-markers
    --strict-config
    -p no:cacheprovider

# Markers for test categorization
markers =
    unit: Fast, isolated unit tests (no external dependencies)
    integration: Integration tests with mocked external dependencies
    real_api: Tests that make real API calls (skipped in CI, requires API key)
    e2e: End-to-end tests
    performance: Performance and benchmark tests
    stress: Stress and load tests
    quality: Quality validation tests
    edge_case: Edge case and error condition tests
    slow: Slow running tests (typically >5 seconds)

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Coverage configuration
[coverage:run]
source = src/openrouter_mcp
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod

[coverage:html]
directory = htmlcov