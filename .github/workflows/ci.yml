name: Collective Intelligence CI/CD

on:
  workflow_dispatch:
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
      with:
        persist-credentials: false

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # actions/cache@v5
      with:
        path: |
          ~/.cache/pip
          ~/.cache/pre-commit
        key: ${{ runner.os }}-python-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-python-${{ matrix.python-version }}-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Lint with pre-commit
      run: |
        pre-commit run --all-files
      continue-on-error: true

    - name: Run unit tests
      run: |
        pytest tests/test_collective_intelligence/ -m "unit" --cov=src/openrouter_mcp/collective_intelligence --cov-report=xml --cov-report=term-missing -v

    - name: Run integration tests
      run: |
        pytest tests/test_collective_intelligence/ -m "integration" --cov=src/openrouter_mcp/collective_intelligence --cov-append --cov-report=xml --cov-report=term-missing -v

    - name: Run performance tests
      run: |
        pytest tests/test_collective_intelligence/ -m "performance" --cov=src/openrouter_mcp/collective_intelligence --cov-append --cov-report=xml --cov-report=term-missing -v --maxfail=3
      continue-on-error: true  # Performance tests might be unstable

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: true

    - name: Generate test report
      if: always()
      run: |
        pytest tests/test_collective_intelligence/ --junitxml=test-results.xml --html=test-report.html --self-contained-html
      continue-on-error: true

    - name: Upload test results
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
        path: |
          test-results.xml
          test-report.html
          htmlcov/

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6
      with:
        node-version: '18'

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # actions/setup-go@v6
      with:
        go-version: '1.25.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-security.txt

    - name: Install semgrep
      run: |
        python -m venv .security-semgrep
        .security-semgrep/bin/python -m pip install --upgrade pip
        .security-semgrep/bin/python -m pip install -r requirements-semgrep.txt

    - name: Initialize security scan status
      run: |
        printf '{}\n' > security-status.json

    - name: Run safety check
      run: |
        set +e
        safety check \
          -r requirements.txt \
          -r requirements-dev.txt \
          -r requirements-security.txt \
          -r requirements-semgrep.txt \
          --json \
          --save-json safety-report.json > safety-output.json
        status=$?
        python - safety "$status" <<'PY'
        import json
        import sys
        from pathlib import Path

        path = Path("security-status.json")
        data = json.loads(path.read_text())
        data[sys.argv[1]] = int(sys.argv[2])
        path.write_text(json.dumps(data, sort_keys=True) + "\n")
        PY
        exit 0
      continue-on-error: true

    - name: Run npm audit
      run: |
        set +e
        npm audit --json > npm-audit-report.json
        status=$?
        python - npm-audit "$status" <<'PY'
        import json
        import sys
        from pathlib import Path

        path = Path("security-status.json")
        data = json.loads(path.read_text())
        data[sys.argv[1]] = int(sys.argv[2])
        path.write_text(json.dumps(data, sort_keys=True) + "\n")
        PY
        exit 0
      continue-on-error: true

    - name: Run Grype scan
      run: |
        set -euo pipefail
        grype_version="0.112.0"
        grype_asset="grype_${grype_version}_linux_amd64.tar.gz"
        grype_dir="$(mktemp -d)"
        curl -fsSL \
          "https://github.com/anchore/grype/releases/download/v${grype_version}/${grype_asset}" \
          -o "${grype_dir}/${grype_asset}"
        curl -fsSL \
          "https://github.com/anchore/grype/releases/download/v${grype_version}/grype_${grype_version}_checksums.txt" \
          -o "${grype_dir}/grype_${grype_version}_checksums.txt"
        grep "  ${grype_asset}$" "${grype_dir}/grype_${grype_version}_checksums.txt" | (
          cd "${grype_dir}"
          sha256sum -c -
        )
        tar -xzf "${grype_dir}/${grype_asset}" -C "${grype_dir}"

        set +e
        "${grype_dir}/grype" dir:. -o json > grype-report.json
        status=$?
        python - grype "$status" <<'PY'
        import json
        import sys
        from pathlib import Path

        path = Path("security-status.json")
        data = json.loads(path.read_text())
        data[sys.argv[1]] = int(sys.argv[2])
        path.write_text(json.dumps(data, sort_keys=True) + "\n")
        PY
        exit 0
      continue-on-error: true

    - name: Run Trivy scan
      run: |
        set -euo pipefail
        trivy_version="0.70.0"
        trivy_asset="trivy_${trivy_version}_Linux-64bit.tar.gz"
        trivy_dir="$(mktemp -d)"
        trivy_cache_dir="$(mktemp -d)"
        curl -fsSL \
          "https://github.com/aquasecurity/trivy/releases/download/v${trivy_version}/${trivy_asset}" \
          -o "${trivy_dir}/${trivy_asset}"
        curl -fsSL \
          "https://github.com/aquasecurity/trivy/releases/download/v${trivy_version}/trivy_${trivy_version}_checksums.txt" \
          -o "${trivy_dir}/trivy_${trivy_version}_checksums.txt"
        grep "  ${trivy_asset}$" "${trivy_dir}/trivy_${trivy_version}_checksums.txt" | (
          cd "${trivy_dir}"
          sha256sum -c -
        )
        tar -xzf "${trivy_dir}/${trivy_asset}" -C "${trivy_dir}"

        set +e
        TRIVY_CACHE_DIR="${trivy_cache_dir}" "${trivy_dir}/trivy" fs \
          --scanners vuln \
          --format json \
          --output trivy-report.json \
          --skip-dirs node_modules \
          --skip-dirs .git \
          --skip-dirs .security-semgrep \
          .
        status=$?
        python - trivy "$status" <<'PY'
        import json
        import sys
        from pathlib import Path

        path = Path("security-status.json")
        data = json.loads(path.read_text())
        data[sys.argv[1]] = int(sys.argv[2])
        path.write_text(json.dumps(data, sort_keys=True) + "\n")
        PY
        exit 0
      continue-on-error: true

    - name: Run pip-audit
      run: |
        set +e
        pip-audit -r requirements.txt -r requirements-dev.txt --format json --output pip-audit-report.json
        status=$?
        python - pip-audit "$status" <<'PY'
        import json
        import sys
        from pathlib import Path

        path = Path("security-status.json")
        data = json.loads(path.read_text())
        data[sys.argv[1]] = int(sys.argv[2])
        path.write_text(json.dumps(data, sort_keys=True) + "\n")
        PY
        exit 0
      continue-on-error: true

    - name: Run pip-audit for security scanners
      run: |
        set +e
        pip-audit -r requirements-security.txt --format json --output pip-audit-security-report.json
        status=$?
        python - pip-audit-security "$status" <<'PY'
        import json
        import sys
        from pathlib import Path

        path = Path("security-status.json")
        data = json.loads(path.read_text())
        data[sys.argv[1]] = int(sys.argv[2])
        path.write_text(json.dumps(data, sort_keys=True) + "\n")
        PY
        exit 0
      continue-on-error: true

    - name: Run pip-audit for semgrep environment
      run: |
        set +e
        pip-audit -r requirements-semgrep.txt --format json --output pip-audit-semgrep-report.json
        status=$?
        python - pip-audit-semgrep "$status" <<'PY'
        import json
        import sys
        from pathlib import Path

        path = Path("security-status.json")
        data = json.loads(path.read_text())
        data[sys.argv[1]] = int(sys.argv[2])
        path.write_text(json.dumps(data, sort_keys=True) + "\n")
        PY
        exit 0
      continue-on-error: true

    - name: Run OSV scan for npm lockfile
      run: |
        set +e
        go run github.com/google/osv-scanner/cmd/osv-scanner@v1.9.2 --lockfile package-lock.json --format json > osv-package-lock-report.json
        status=$?
        python - osv-package-lock "$status" <<'PY'
        import json
        import sys
        from pathlib import Path

        path = Path("security-status.json")
        data = json.loads(path.read_text())
        data[sys.argv[1]] = int(sys.argv[2])
        path.write_text(json.dumps(data, sort_keys=True) + "\n")
        PY
        exit 0
      continue-on-error: true

    - name: Run OSV scan for Python requirements
      run: |
        set +e
        go run github.com/google/osv-scanner/cmd/osv-scanner@v1.9.2 \
          --lockfile requirements.txt \
          --lockfile requirements-dev.txt \
          --lockfile requirements-security.txt \
          --lockfile requirements-semgrep.txt \
          --format json > osv-requirements-report.json
        status=$?
        python - osv-requirements "$status" <<'PY'
        import json
        import sys
        from pathlib import Path

        path = Path("security-status.json")
        data = json.loads(path.read_text())
        data[sys.argv[1]] = int(sys.argv[2])
        path.write_text(json.dumps(data, sort_keys=True) + "\n")
        PY
        exit 0
      continue-on-error: true

    - name: Run OSV v2 source scan
      run: |
        set -euo pipefail
        osv_version="2.3.6"
        osv_asset="osv-scanner_linux_amd64"
        osv_dir="$(mktemp -d)"
        curl -fsSL \
          "https://github.com/google/osv-scanner/releases/download/v${osv_version}/${osv_asset}" \
          -o "${osv_dir}/${osv_asset}"
        curl -fsSL \
          "https://github.com/google/osv-scanner/releases/download/v${osv_version}/osv-scanner_SHA256SUMS" \
          -o "${osv_dir}/osv-scanner_SHA256SUMS"
        grep "  ${osv_asset}$" "${osv_dir}/osv-scanner_SHA256SUMS" | (
          cd "${osv_dir}"
          sha256sum -c -
        )
        chmod +x "${osv_dir}/${osv_asset}"

        set +e
        "${osv_dir}/${osv_asset}" scan source \
          --recursive \
          --experimental-exclude .git \
          --experimental-exclude .security-semgrep \
          --experimental-exclude node_modules \
          --format json \
          --output-file osv-v2-source-report.json \
          .
        status=$?
        python - osv-v2-source "$status" <<'PY'
        import json
        import sys
        from pathlib import Path

        path = Path("security-status.json")
        data = json.loads(path.read_text())
        data[sys.argv[1]] = int(sys.argv[2])
        path.write_text(json.dumps(data, sort_keys=True) + "\n")
        PY
        exit 0
      continue-on-error: true

    - name: Run bandit security scan
      run: |
        set +e
        bandit -r src/ -f json -o bandit-report.json
        status=$?
        python - bandit "$status" <<'PY'
        import json
        import sys
        from pathlib import Path

        path = Path("security-status.json")
        data = json.loads(path.read_text())
        data[sys.argv[1]] = int(sys.argv[2])
        path.write_text(json.dumps(data, sort_keys=True) + "\n")
        PY
        exit 0
      continue-on-error: true

    - name: Run semgrep auto scan
      run: |
        set +e
        .security-semgrep/bin/semgrep scan --config=auto src bin tests --json --output=semgrep-auto-report.json
        status=$?
        python - semgrep-auto "$status" <<'PY'
        import json
        import sys
        from pathlib import Path

        path = Path("security-status.json")
        data = json.loads(path.read_text())
        data[sys.argv[1]] = int(sys.argv[2])
        path.write_text(json.dumps(data, sort_keys=True) + "\n")
        PY
        exit 0
      continue-on-error: true

    - name: Run semgrep OWASP scan
      run: |
        set +e
        .security-semgrep/bin/semgrep scan --config=p/owasp-top-ten src bin tests --metrics off --json --output=semgrep-owasp-report.json
        status=$?
        python - semgrep-owasp "$status" <<'PY'
        import json
        import sys
        from pathlib import Path

        path = Path("security-status.json")
        data = json.loads(path.read_text())
        data[sys.argv[1]] = int(sys.argv[2])
        path.write_text(json.dumps(data, sort_keys=True) + "\n")
        PY
        exit 0
      continue-on-error: true

    - name: Upload security reports
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          security-status.json
          safety-report.json
          safety-output.json
          npm-audit-report.json
          grype-report.json
          trivy-report.json
          pip-audit-report.json
          pip-audit-security-report.json
          pip-audit-semgrep-report.json
          osv-package-lock-report.json
          osv-requirements-report.json
          osv-v2-source-report.json
          bandit-report.json
          semgrep-auto-report.json
          semgrep-auto-baseline.json
          semgrep-owasp-report.json

    - name: Evaluate security scan results
      if: always()
      run: |
        python scripts/evaluate_security_reports.py \
          --report-dir . \
          --semgrep-auto-baseline semgrep-auto-baseline.json \
          --source-root .

  quality-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install mypy pylint flake8 black isort

    - name: Check code formatting with black
      run: |
        black --check --diff src/ tests/

    - name: Check import sorting with isort
      run: |
        isort --check-only --diff src/ tests/

    - name: Run flake8
      run: |
        flake8 src/ tests/ --output-file=flake8-report.txt
      continue-on-error: true

    - name: Run pylint
      run: |
        pylint src/ --output-format=json --output=pylint-report.json
      continue-on-error: true

    - name: Run mypy type checking
      run: |
        mypy src/ --json-report mypy-report
      continue-on-error: true

    - name: Upload quality reports
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
      if: always()
      with:
        name: quality-reports
        path: |
          flake8-report.txt
          pylint-report.json
          mypy-report/

  benchmark:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run comprehensive benchmarks
      run: |
        pytest tests/test_collective_intelligence/test_performance_benchmarks.py -v --benchmark-json=benchmark-results.json
      timeout-minutes: 30

    - name: Generate benchmark report
      run: |
        python -c "
        import json
        import datetime
        with open('benchmark-results.json', 'r') as f:
            data = json.load(f)

        with open('benchmark-summary.md', 'w') as f:
            f.write('# Benchmark Results\\n\\n')
            f.write(f'Generated: {datetime.datetime.now().isoformat()}\\n\\n')
            f.write('## Performance Summary\\n\\n')
            # Add benchmark analysis here
        "

    - name: Upload benchmark results
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: |
          benchmark-results.json
          benchmark-summary.md

    - name: Comment benchmark results on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # actions/github-script@v8
      with:
        script: |
          const fs = require('fs');
          if (fs.existsSync('benchmark-summary.md')) {
            const summary = fs.readFileSync('benchmark-summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
          }

  documentation:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install sphinx sphinx-rtd-theme sphinx-autodoc-typehints

    - name: Generate API documentation
      run: |
        sphinx-apidoc -o docs/api src/openrouter_mcp/collective_intelligence
        sphinx-build -b html docs docs/_build/html

    - name: Upload documentation
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # actions/upload-artifact@v4
      with:
        name: documentation
        path: docs/_build/html

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/main'
      uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/_build/html

  notify:
    runs-on: ubuntu-latest
    needs: [test, security-scan, quality-checks]
    if: always()
    steps:
    - name: Notify success
      if: needs.test.result == 'success' && needs.security-scan.result == 'success' && needs.quality-checks.result == 'success'
      run: |
        echo "All CI checks passed successfully!"

    - name: Notify failure
      if: needs.test.result == 'failure' || needs.security-scan.result == 'failure' || needs.quality-checks.result == 'failure'
      run: |
        echo "Some CI checks failed. Please review the results."
        exit 1
