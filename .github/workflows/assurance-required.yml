name: Assurance Required

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  commit-message-validation:
    name: Commit Message Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Validate commit messages in PR range
        shell: bash
        run: |
          set -euo pipefail

          BASE_REF="origin/${{ github.base_ref }}"
          git fetch --no-tags --prune origin "${{ github.base_ref }}"

          mapfile -t COMMIT_SUBJECTS < <(git log --format=%s "${BASE_REF}..HEAD")
          if [ ${#COMMIT_SUBJECTS[@]} -eq 0 ]; then
            echo "No commits found in PR range."
            exit 0
          fi

          status=0
          for subject in "${COMMIT_SUBJECTS[@]}"; do
            [ -z "${subject}" ] && continue
            tmp_file="$(mktemp)"
            printf '%s\n' "${subject}" > "${tmp_file}"

            if ! python scripts/validate_commit_msg.py "${tmp_file}"; then
              echo "Invalid commit message: ${subject}"
              status=1
            fi

            rm -f "${tmp_file}"
          done

          exit "${status}"

  required-assurance:
    name: Required Assurance Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install Node dependencies
        run: npm install

      - name: Run assurance test suite
        run: |
          python3 run_tests.py assurance -v

  required-static-checks:
    name: Required Static Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Black check
        run: black --check src/ tests/

      - name: Isort check
        run: isort --check-only src/ tests/
