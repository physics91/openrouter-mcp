name: Assurance Required

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  commit-message-validation:
    name: Commit Message Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Validate commit messages in PR range
        shell: bash
        run: |
          set -euo pipefail

          BASE_BRANCH="${GITHUB_BASE_REF:?GITHUB_BASE_REF is required}"
          BASE_REF="origin/${BASE_BRANCH}"

          mapfile -t COMMIT_SUBJECTS < <(git log --format=%s "${BASE_REF}..HEAD")
          if [ ${#COMMIT_SUBJECTS[@]} -eq 0 ]; then
            echo "No commits found in PR range."
            exit 0
          fi

          status=0
          for subject in "${COMMIT_SUBJECTS[@]}"; do
            [ -z "${subject}" ] && continue
            tmp_file="$(mktemp)"
            printf '%s\n' "${subject}" > "${tmp_file}"

            if ! python scripts/validate_commit_msg.py "${tmp_file}"; then
              echo "Invalid commit message: ${subject}"
              status=1
            fi

            rm -f "${tmp_file}"
          done

          exit "${status}"

  required-assurance:
    name: Required Assurance Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # actions/setup-node@v6
        with:
          node-version: "18"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install -r requirements-security.txt

      - name: Install Node dependencies
        run: npm install

      - name: Run assurance test suite
        run: |
          python3 run_tests.py assurance -v

      - name: Run dependency vulnerability audit
        run: |
          pip-audit --strict \
            -r requirements.txt \
            -r requirements-dev.txt
          pip-audit --strict \
            -r requirements-security.txt
          pip-audit --strict \
            -r requirements-semgrep.txt
          npm audit

  required-static-checks:
    name: Required Static Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Black check
        run: black --check src/ tests/

      - name: Isort check
        run: isort --check-only src/ tests/
