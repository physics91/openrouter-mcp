name: Assurance Required

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  commit-message-validation:
    name: Commit Message Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Validate commit messages in PR range
        shell: bash
        run: |
          set -euo pipefail

          BASE_BRANCH="${GITHUB_BASE_REF:?GITHUB_BASE_REF is required}"
          BASE_REF="origin/${BASE_BRANCH}"

          mapfile -t COMMIT_SUBJECTS < <(git log --format=%s "${BASE_REF}..HEAD")
          if [ ${#COMMIT_SUBJECTS[@]} -eq 0 ]; then
            echo "No commits found in PR range."
            exit 0
          fi

          status=0
          for subject in "${COMMIT_SUBJECTS[@]}"; do
            [ -z "${subject}" ] && continue
            tmp_file="$(mktemp)"
            printf '%s\n' "${subject}" > "${tmp_file}"

            if ! python scripts/validate_commit_msg.py "${tmp_file}"; then
              echo "Invalid commit message: ${subject}"
              status=1
            fi

            rm -f "${tmp_file}"
          done

          exit "${status}"

  required-assurance:
    name: Required Assurance Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install -r requirements-security.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Run assurance test suite
        run: |
          python3 run_tests.py assurance -v

      - name: Run dependency vulnerability audit
        run: |
          pip-audit --strict \
            -r requirements.txt \
            -r requirements-dev.txt
          pip-audit --strict \
            -r requirements-security.txt
          pip-audit --strict \
            -r requirements-semgrep.txt
          npm audit

      - name: Run npm package signature audit
        run: |
          set -euo pipefail
          status=0
          for attempt in 1 2 3; do
            set +e
            npm --silent run security:audit-signatures -- --json > npm-audit-signatures-required-report.json
            status=$?
            set -e

            if [ "${status}" -eq 0 ]; then
              break
            fi
            if python - npm-audit-signatures-required-report.json <<'PY'
          import json
          import sys

          try:
              data = json.loads(open(sys.argv[1], encoding="utf-8").read())
          except (OSError, json.JSONDecodeError):
              raise SystemExit(1)

          invalid = data.get("invalid")
          missing = data.get("missing")
          if isinstance(invalid, list) and isinstance(missing, list) and (invalid or missing):
              raise SystemExit(0)
          raise SystemExit(1)
          PY
            then
              break
            fi
            if [ "${attempt}" -lt 3 ]; then
              sleep $((attempt * 5))
            fi
          done

          if [ "${status}" -ne 0 ]; then
            cat npm-audit-signatures-required-report.json || true
          fi
          exit "${status}"

      - name: Run required secret scan
        run: |
          set -euo pipefail
          gitleaks_version="8.30.1"
          gitleaks_asset="gitleaks_${gitleaks_version}_linux_x64.tar.gz"
          gitleaks_dir="$(mktemp -d)"
          gitleaks_scan_dir="$(mktemp -d)"
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${gitleaks_version}/${gitleaks_asset}" \
            -o "${gitleaks_dir}/${gitleaks_asset}"
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${gitleaks_version}/gitleaks_${gitleaks_version}_checksums.txt" \
            -o "${gitleaks_dir}/gitleaks_${gitleaks_version}_checksums.txt"
          grep "  ${gitleaks_asset}$" "${gitleaks_dir}/gitleaks_${gitleaks_version}_checksums.txt" | (
            cd "${gitleaks_dir}"
            sha256sum -c -
          )
          tar -xzf "${gitleaks_dir}/${gitleaks_asset}" -C "${gitleaks_dir}"
          git archive HEAD | tar -x -C "${gitleaks_scan_dir}"

          "${gitleaks_dir}/gitleaks" dir \
            --no-banner \
            --redact=100 \
            --report-format json \
            --report-path gitleaks-required-report.json \
            "${gitleaks_scan_dir}"

  required-static-checks:
    name: Required Static Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Black check
        run: black --check src/ tests/

      - name: Isort check
        run: isort --check-only src/ tests/
