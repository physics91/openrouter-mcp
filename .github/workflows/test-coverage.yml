name: Test Coverage

on:
  workflow_dispatch:
  schedule:
    # Run coverage weekly at 3 AM UTC on Sunday
    - cron: '0 3 * * 0'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/test_models_cache.py \
            tests/test_metadata.py \
            tests/test_mcp_cli.py \
            tests/test_client/ \
            tests/test_handlers/ \
            tests/test_collective_intelligence/ \
            tests/test_lifecycle_manager.py \
            tests/test_operational_controls.py \
            --cov=src/openrouter_mcp \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=60 \
            -v

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate coverage badge
        if: matrix.python-version == '3.11' && github.ref == 'refs/heads/main'
        run: |
          coverage_percent=$(python -c "import xml.etree.ElementTree as ET; tree = ET.parse('coverage.xml'); print(f\"{float(tree.getroot().attrib['line-rate']) * 100:.0f}\")")
          echo "COVERAGE=$coverage_percent" >> $GITHUB_ENV

      - name: Create coverage comment
        if: github.event_name == 'pull_request' && matrix.python-version == '3.11'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 70
          MINIMUM_ORANGE: 60

  quick-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install Node.js dependencies
        run: npm install

      - name: Quick smoke test
        run: |
          pytest tests/test_tool_registration_simple.py \
            tests/test_models_cache.py \
            -v --tb=short

      - name: Run security tests
        run: npm run test:security

      - name: Lint check
        run: |
          pip install ruff
          ruff check src/ tests/ --select E,F,W

  coverage-report:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Generate full coverage report
        run: |
          pytest tests/ \
            --cov=src/openrouter_mcp \
            --cov-report=html \
            --cov-report=term-missing

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30
